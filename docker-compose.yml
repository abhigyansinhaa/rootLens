services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rca_db
      MYSQL_USER: rca_user
      MYSQL_PASSWORD: rca_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/mysql_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_pass --silent && mysql -uroot -proot_pass -e 'SELECT 1' rca_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: mysql+pymysql://rca_user:rca_pass@mysql:3306/rca_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  worker:
    build: ./backend
    volumes:
      - ./data:/data
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env — see env.example}
      DATABASE_URL: mysql+pymysql://rca_user:rca_pass@mysql:3306/rca_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
    command: ["rq", "worker", "default", "--url", "redis://redis:6379/0"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
